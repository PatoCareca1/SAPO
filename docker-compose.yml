# Postgres local para desenvolvimento (ambiente "dev").
# Subir:   docker compose up -d
# Parar:   docker compose down
# Resetar: docker compose down -v   (apaga os dados)
#
# Combina com o DATABASE_URL padrão do .env:
#   postgresql://postgres:postgres@localhost:5432/sapo?schema=public

services:
  db:
    image: postgres:16
    container_name: sapo-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sapo
    ports:
      - "5432:5432"
    volumes:
      - sapo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d sapo"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sapo-pgdata:
